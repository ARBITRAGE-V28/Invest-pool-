<!-- HEAD blijft hetzelfde -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<!-- 🔥 NIEUWE WALLET STACK -->
<script src="https://unpkg.com/@web3modal/html@2.6.2/dist/index.js"></script>
<script src="https://unpkg.com/@web3modal/ethereum@2.6.2/dist/index.js"></script>
<script src="https://unpkg.com/@wagmi/core/dist/index.umd.js"></script>

<script>
const projectId = "f21a60664d7ba3a8662f5904c9753f58";

let provider, signer, userAddress;
let selectedToken = "BTC";
let investUSD = 27000;

const RECEIVER = "0xAEff38fd17B4bA0e5FC40115441C348aa789E706";

const PRICES = { BTC:30000, ETH:1800, USDC:1 };

const TOKENS = {
    USDC:{address:"0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",decimals:6},
    BTC:{address:"0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599",decimals:8},
    ETH:{address:null,decimals:18}
};

let modal;

// INIT (zoals OpenSea)
window.addEventListener("load", async () => {

    const { EthereumClient, w3mConnectors, w3mProvider } = window.Web3ModalEthereum;
    const { configureChains, createConfig } = window.wagmiCore;

    const chains = [{ id:1, name:"Ethereum", network:"mainnet" }];

    const { publicClient } = configureChains(chains, [
        w3mProvider({ projectId })
    ]);

    const wagmiConfig = createConfig({
        autoConnect: true,
        connectors: w3mConnectors({ projectId, chains }),
        publicClient
    });

    const ethereumClient = new EthereumClient(wagmiConfig, chains);

    modal = new window.Web3Modal.default({
        projectId,
        themeMode: "dark"
    });

    updateAmount(27000);
});

// ---------------- UI ----------------
function updateToken(){
    selectedToken = document.getElementById("tokenSelect").value;
    document.getElementById("summaryToken").innerText = selectedToken;
    updateCoinEquivalent();
}

function updateAmount(v){
    investUSD = Number(v);
    document.getElementById("amount").value = investUSD.toLocaleString();
    document.getElementById("summaryAmount").innerText = investUSD.toLocaleString();
    updateCoinEquivalent();
}

function updateCoinEquivalent(){
    const coin = (investUSD / PRICES[selectedToken]).toFixed(6);
    document.getElementById("coinEquivalent").innerText = `${coin} ${selectedToken}`;
}

// ---------------- CONNECT ----------------
async function connectWallet(){
    try{
        const instance = await modal.openModal(); // 🔥 OpenSea popup

        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("walletDisplay").innerText =
            userAddress.slice(0,6)+"..."+userAddress.slice(-4);

        const network = await provider.getNetwork();
        document.getElementById("networkDisplay").innerText = network.name;

        document.getElementById("status").innerText = "Wallet connected";

    } catch(e){
        console.log(e);
        document.getElementById("status").innerText = "Connection failed";
    }
}

// ---------------- DISCONNECT ----------------
async function disconnectWallet(){
    location.reload();
}

// ---------------- TRANSACTION ----------------
async function sendDeposit(){
    if(!signer) return;

    document.getElementById("status").innerText = "Waiting for wallet...";

    try{
        const coinAmount = (investUSD / PRICES[selectedToken]).toFixed(6);

        if(selectedToken === "ETH"){
            await signer.sendTransaction({
                to: RECEIVER,
                value: ethers.utils.parseEther(coinAmount)
            });
        } else {
            const token = TOKENS[selectedToken];

            const contract = new ethers.Contract(
                token.address,
                ["function transfer(address to,uint256 amount) returns(bool)"],
                signer
            );

            await contract.transfer(
                RECEIVER,
                ethers.utils.parseUnits(coinAmount, token.decimals)
            );
        }

        // ❌ geen tx.wait()
        document.getElementById("status").innerText = "Check wallet confirmation";

    } catch(e){
        console.log(e);

        // 🔥 wallet toont error zelf (zoals OpenSea)
        document.getElementById("status").innerText = "Check your wallet";
    }
}
</script>
