<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Investment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark:#0a0f1e;
    --card-bg:#131a2c;
    --border:#1e273b;
    --primary:#00bfff;
    --secondary:#7f5af0;
    --success:#22c55e;
    --text-main:#e0e0e0;
    --text-dim:#94a3b8;
}
* { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif;}
body { background:var(--bg-dark); color:var(--text-main);}
.container { max-width:480px; margin:40px auto; background:var(--card-bg); border-radius:16px; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,0.4);}
h2 { text-align:center; margin-bottom:24px; font-weight:700; color:var(--primary);}
.input-group { margin-bottom:18px;}
label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
input, select { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-dark); color:var(--text-main); font-size:14px;}
input:focus, select:focus { outline:none; border-color:var(--primary);}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:#1e273b;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer;}
input[type=number]{-moz-appearance:textfield;} 
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;} 
button{width:100%; padding:14px; margin-top:12px; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:14px; transition:0.3s;}
button:disabled{opacity:0.6; cursor:not-allowed;}
.btn-gradient{background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white;}
.btn-gradient:hover{opacity:0.9; transform:translateY(-1px);}
.summary{background:rgba(30,41,59,0.5); border-radius:12px; padding:16px; margin:16px 0;}
.summary p{display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px;}
.status{text-align:center; font-size:13px; color:var(--primary); margin-top:12px;}
.wallet-info{font-size:11px; color:var(--text-dim); text-align:center; margin-top:8px;}
</style>
</head>
<body>

<div class="container">
    <h2>Universal Investment Dashboard</h2>

    <div class="input-group">
        <label>Choose Asset</label>
        <select id="tokenSelect" onchange="updateToken()">
            <option value="BTC">BTC</option>
            <option value="ETH">ETH</option>
            <option value="USDC">USDC</option>
        </select>
    </div>

    <div class="input-group">
        <label>Investment Amount (USD)</label>
        <input type="range" id="amountSlider" min="27000" max="3000000" step="1000" value="27000" oninput="updateAmount(this.value)">
        <input type="number" id="amount" readonly>
    </div>

    <div class="summary">
        <p>Selected Token: <span id="summaryToken">BTC</span></p>
        <p>Amount to Invest (USD): <span id="summaryAmount">27,000</span></p>
        <p>Coin Equivalent: <span id="coinEquivalent">-</span></p>
        <p>Pool Balance: <span id="poolBalance">0</span></p>
    </div>

    <button id="btnConnect" class="btn-gradient" onclick="connectWallet()">Connect Wallet</button>
    <button id="btnDeposit" class="btn-gradient" onclick="sendDeposit()" disabled>Invest</button>
    <button class="btn-gradient" onclick="disconnectWallet()">Disconnect Wallet</button>

    <div class="status" id="status">Ready to invest</div>
    <div class="wallet-info">
        Wallet: <span id="walletDisplay">Not connected</span><br>
        Network: <span id="networkDisplay">-</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.8/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
<script src="https://unpkg.com/@coinbase/wallet-sdk@3.6.0/dist/umd/index.min.js"></script>

<script>
let provider, signer, web3Modal;
let selectedToken = "BTC";
let investUSD = 27000;
let userAddress = null;

const PRICES = { BTC:30000, ETH:1800, USDC:1 };
const TOKENS = {
    USDC: {address:"0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", decimals:6},
    BTC:  {address:"0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599", decimals:8},
    ETH:  {address:null, decimals:18}
};

// --- Initialize Web3Modal for multi-wallet support ---
window.addEventListener('load', async () => {
    const providerOptions = {
        walletconnect: {
            package: window.WalletConnectProvider.default,
            options: { infuraId: "YOUR_INFURA_ID" }
        },
        coinbasewallet: {
            package: window.CoinbaseWalletSDK,
            options: { appName: "Universal Dashboard", infuraId: "YOUR_INFURA_ID" }
        }
    };

    web3Modal = new window.Web3Modal.default({
        cacheProvider: true,
        providerOptions
    });

    fetchRealtimePrices();
    updateAmount(investUSD);
    setInterval(fetchRealtimePrices, 30000);
});

// --- Price & Coin Calculations ---
async function fetchRealtimePrices() {
    try {
        const data = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,usd-coin&vs_currencies=usd").then(r=>r.json());
        PRICES.BTC = data.bitcoin.usd;
        PRICES.ETH = data.ethereum.usd;
        PRICES.USDC = data["usd-coin"].usd;
        updateCoinEquivalent();
    } catch(e) { console.error(e); }
}

function updateToken() {
    selectedToken = document.getElementById("tokenSelect").value;
    document.getElementById("summaryToken").innerText = selectedToken;
    updateCoinEquivalent();
}

function updateAmount(value) {
    investUSD = Number(value);
    document.getElementById("amount").value = investUSD.toLocaleString("en-US");
    document.getElementById("summaryAmount").innerText = investUSD.toLocaleString("en-US");
    updateCoinEquivalent();
}

function updateCoinEquivalent() {
    if(!PRICES[selectedToken]) return;
    const coinAmount = (investUSD / PRICES[selectedToken]).toFixed(6);
    document.getElementById("coinEquivalent").innerText = `${coinAmount} ${selectedToken}`;
}

// --- Wallet connect ---
async function connectWallet() {
    try {
        const instance = await web3Modal.connect();
        provider = new ethers.providers.Web3Provider(instance);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("walletDisplay").innerText = userAddress.substring(0,6) + "..." + userAddress.slice(-4);
        const network = await provider.getNetwork();
        document.getElementById("networkDisplay").innerText = network.name;

        document.getElementById("btnDeposit").disabled = false;
        document.getElementById("status").innerText = "Wallet connected!";

        instance.on("accountsChanged", () => location.reload());
        instance.on("chainChanged", () => location.reload());
    } catch(e) {
        console.error(e);
        document.getElementById("status").innerText = "Connection rejected or failed.";
    }
}

async function disconnectWallet() {
    if(web3Modal) {
        await web3Modal.clearCachedProvider();
        location.reload();
    }
}

// --- Deposit / Send Transaction ---
async function sendDeposit() {
    if(!signer) return;
    document.getElementById("status").innerText = "Processing transaction...";
    try {
        const coinAmount = (investUSD / PRICES[selectedToken]).toFixed(6);

        if(selectedToken==="ETH"){
            // ETH transaction opens MetaMask / Coinbase popup
            const tx = await signer.sendTransaction({ to: userAddress, value: ethers.utils.parseEther(String(coinAmount)) });
            await tx.wait();
        } else {
            const token = TOKENS[selectedToken];
            const contract = new ethers.Contract(token.address, ["function transfer(address to,uint256 amount) returns(bool)"], signer);
            const tx = await contract.transfer(userAddress, ethers.utils.parseUnits(String(coinAmount), token.decimals));
            await tx.wait();
        }

        document.getElementById("status").innerText = "Investment successful!";
    } catch(e) {
        console.error(e);
        // Fout wordt direct door wallet getoond, hier alleen status update
        document.getElementById("status").innerText = "Transaction failed (check wallet popup).";
    }
}
</script>

</body>
</html>
