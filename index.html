<script>
let provider = null, signer = null;
let selectedToken = "BTC";
let investUSD = 27000;
let POOL_ADDRESS = null;

// Prijzen die realtime worden geüpdatet
const PRICES = {
    BTC: 30000,
    ETH: 1800,
    USDC: 1
};

const TOKENS = {
    USDC: {address:"0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", decimals:6},
    BTC:  {address:"0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599", decimals:8},
    ETH:  {address:null, decimals:18}
};

// Haal realtime prijzen op via CoinGecko
async function fetchRealtimePrices() {
    try {
        const response = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,usd-coin&vs_currencies=usd"
        );
        const data = await response.json();
        PRICES.BTC = data.bitcoin.usd;
        PRICES.ETH = data.ethereum.usd;
        PRICES.USDC = data["usd-coin"].usd;
        updateCoinEquivalent();
    } catch(e) {
        console.error("Failed to fetch realtime prices:", e);
    }
}

function updateToken() {
    selectedToken = document.getElementById("tokenSelect").value;
    document.getElementById("summaryToken").innerText = selectedToken;
    updateCoinEquivalent();
}

function updateAmount(value) {
    investUSD = Number(value);
    document.getElementById("amount").value = investUSD.toLocaleString("en-US");
    document.getElementById("summaryAmount").innerText = investUSD.toLocaleString("en-US");
    updateCoinEquivalent();
}

function updateCoinEquivalent() {
    if(!PRICES[selectedToken]) return;
    const coinAmount = (investUSD / PRICES[selectedToken]).toFixed(6);
    document.getElementById("coinEquivalent").innerText = `${coinAmount} ${selectedToken}`;
}

// ---- Nieuwe connect-wallet logica ----
async function connectWallet() {
    if (typeof window.ethereum === 'undefined') {
        alert("MetaMask not detected. Please install it first.");
        return;
    }
    
    try {
        // Direct vanuit klik-event requesten
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        provider = new ethers.providers.Web3Provider(window.ethereum, "any");
        signer = provider.getSigner();
        POOL_ADDRESS = accounts[0];

        // Update UI
        document.getElementById("walletDisplay").innerText = POOL_ADDRESS.substring(0,6) + "..." + POOL_ADDRESS.slice(-4);
        const network = await provider.getNetwork();
        document.getElementById("networkDisplay").innerText = network.name;

        // Activeer deposit-knop
        document.getElementById("btnDeposit").disabled = false;
        document.getElementById("status").innerText = "Wallet connected.";

        // Optioneel: update pool balance
        updatePoolBalance();

        // Event listener voor netwerkverandering
        window.ethereum.on('chainChanged', () => window.location.reload());
    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Connection failed or rejected.";
    }
}

async function updatePoolBalance() {
    if(!provider) return;
    const bal = (Math.random()*100).toFixed(2);
    document.getElementById("poolBalance").innerText = bal;
}

async function sendDeposit() {
    if(!signer || investUSD < 27000) return;
    document.getElementById("status").innerText = "Processing...";
    try {
        const coinAmount = (investUSD / PRICES[selectedToken]).toFixed(6);
        if(selectedToken==="ETH"){
            const tx = await signer.sendTransaction({to:POOL_ADDRESS, value:ethers.utils.parseEther(String(coinAmount))});
            await tx.wait();
        } else {
            const token = TOKENS[selectedToken];
            const contract = new ethers.Contract(token.address, ["function transfer(address to,uint256 amount) returns(bool)"], signer);
            const tx = await contract.transfer(POOL_ADDRESS, ethers.utils.parseUnits(String(coinAmount), token.decimals));
            await tx.wait();
        }
        document.getElementById("status").innerText = "Investment successful!";
        updatePoolBalance();
    } catch(e) {
        console.error(e);
        document.getElementById("status").innerText = "Transaction failed.";
    }
}

// Initialiseer display en realtime prijzen
fetchRealtimePrices();
updateAmount(27000);

// Update prijzen automatisch elke 30 seconden
setInterval(fetchRealtimePrices, 30000);
</script>
